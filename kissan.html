<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الاواني عبدالكريم</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

h1{
    text-align:center;
    color:#8b5a2b;
    margin:30px 0;
}

.container{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
    text-align:center;
    transition:0.3s;
    padding-bottom:20px;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card h2{
    margin:20px 0;
    color:#8b5a2b;
}

.quantity{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    margin-bottom:15px;
}

.quantity button{
    width:35px;
    height:35px;
    border:none;
    border-radius:50%;
    background:#d4a373;
    color:white;
    font-size:20px;
    cursor:pointer;
}

.quantity span{
    font-size:20px;
    font-weight:bold;
}

.price{
    margin-bottom:15px;
    color:#8b5a2b;
    font-size:20px;
    font-weight:bold;
}

.card > button{
    padding:12px 25px;
    background:#d4a373;
    color:white;
    border:none;
    border-radius:30px;
    cursor:pointer;
    font-size:16px;
}

.card > button:hover{
    background:#8b5a2b;
}

.back-btn{
    position:fixed;
    top:20px;
    left:20px;
    background:#8b5a2b;
    color:white;
    border:none;
    padding:10px 15px;
    border-radius:50px;
    font-size:18px;
    cursor:pointer;
}

.cart-btn{
    position:fixed;
    top:20px;
    right:20px;
    background:#8b5a2b;
    color:white;
    padding:12px 20px;
    text-decoration:none;
    border-radius:30px;
}
</style>
</head>
<body>

<a href="cart.html" class="cart-btn">🛒 السلة</a>

<button class="back-btn" onclick="history.back()">← رجوع</button>

<h1>البرارد</h1>

<div class="container">

<div class="card">
    <img src="kissan.jpg">
    <h2>كيسان</h2>

    <div class="quantity">
        <button onclick="decrease(this)">➖</button>
        <span>1</span>
        <button onclick="increase(this)">➕</button>
    </div>

    <p class="price">150 DH</p>

    <button onclick="addToCart('كيسان',150,this)">
        إضافة إلى السلة
    </button>
</div>

<div class="card">
    <img src="casseroles.jpg">
    <h2>كسرونات</h2>

    <div class="quantity">
        <button onclick="decrease(this)">➖</button>
        <span>1</span>
        <button onclick="increase(this)">➕</button>
    </div>

    <p class="price">200 DH</p>

    <button onclick="addToCart('كسرونات',200,this)">
        إضافة إلى السلة
    </button>
</div>

<div class="card">
    <img src="bread.jpg">
    <h2>براد</h2>

    <div class="quantity">
        <button onclick="decrease(this)">➖</button>
        <span>1</span>
        <button onclick="increase(this)">➕</button>
    </div>

    <p class="price">300 DH</p>

    <button onclick="addToCart('براد',300,this)">
        إضافة إلى السلة
    </button>
</div>

<div class="card">
    <img src="ustensiles.jpg">
    <h2>المقراج</h2>

    <div class="quantity">
        <button onclick="decrease(this)">➖</button>
        <span>1</span>
        <button onclick="increase(this)">➕</button>
    </div>

    <p class="price">250 DH</p>

    <button onclick="addToCart('المقراج',250,this)">
        إضافة إلى السلة
    </button>
</div>

</div>

<script>
function increase(btn){
    let span = btn.parentElement.querySelector("span");
    span.innerText = parseInt(span.innerText) + 1;
}

function decrease(btn){
    let span = btn.parentElement.querySelector("span");
    let value = parseInt(span.innerText);

    if(value > 1){
        span.innerText = value - 1;
    }
}

function addToCart(name, price, btn){

    let quantity = parseInt(
        btn.parentElement.querySelector("span").innerText
    );

    let cart = JSON.parse(localStorage.getItem("cart")) || [];

    let existing = cart.find(item => item.name === name);

    if(existing){
        existing.quantity += quantity;
    }else{
        cart.push({
            name:name,
            price:price,
            quantity:quantity
        });
    }

    localStorage.setItem("cart", JSON.stringify(cart));

    alert("تمت الإضافة إلى السلة ✅");
}
</script>

</body>
</html>
