<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>الاواني عبدالكريم</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    overflow:hidden;
}

/* Video Background */
video{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    object-fit:cover;
    z-index:-2;
}

/* Couche sombre */
.overlay{
    position:fixed;
    top:0;
    left:0;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.45);
    z-index:-1;
}

/* Bannière */
.banner{
    background:#8b5a2b;
    color:white;
    text-align:center;
    padding:18px;
    font-size:22px;
    font-weight:bold;
}

/* Contenu */
.content{
    height:85vh;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    color:white;
}

h1{
    font-size:60px;
    margin-bottom:20px;
}

p{
    font-size:20px;
    margin-bottom:30px;
}

.btn{
    background:#d4a373;
    color:white;
    text-decoration:none;
    padding:18px 40px;
    border-radius:50px;
    font-size:22px;
    transition:0.3s;
}

.btn:hover{
    background:#8b5a2b;
}
</style>
</head>
<body>

<!-- Video Background -->
<video autoplay muted loop>
    <source src="videoplayback.mp4" type="video/mp4">
</video>

<div class="overlay"></div>

<div class="banner">
    الاواني عبدالكريم 
    </div>
    
    <div class="content">
        <h1>المتجر الاواني الفاخرة </h1>
        <p>الاوني عصرية فاخرة</p>
    
        <a href="produits.html" class="btn">
            الذهاب الى المتجر
     </a>
</div>

</body>
</html>
