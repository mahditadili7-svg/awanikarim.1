<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Nos Produits</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

h1{
    text-align:center;
    color:#8b5a2b;
    margin:30px 0;
}

.container{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
    text-align:center;
    transition:0.3s;
    padding-bottom:20px;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card h2{
    margin:20px 0;
    color:#8b5a2b;
}

.quantity{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:15px;
    margin-bottom:15px;
}

.quantity button{
    width:35px;
    height:35px;
    border:none;
    border-radius:50%;
    background:#d4a373;
    color:white;
    font-size:20px;
    cursor:pointer;
}

.quantity span{
    font-size:20px;
    font-weight:bold;
}

.card a{
    display:inline-block;
    padding:12px 25px;
    background:#d4a373;
    color:white;
    text-decoration:none;
    border-radius:30px;
}

.card a:hover{
    background:#8b5a2b;
}
.back-btn{
    position: fixed;
    top: 20px;
    left: 20px;
    background: #8b5a2b;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 50px;
    font-size: 18px;
    cursor: pointer;
}

.back-btn:hover{
    background: #6e4520;
}
</style>
</head>
<body>

    <button class="back-btn" onclick="history.back()">← رجوع</button>

<h1>البرارد</h1>

<div class="container">

    <div class="card">
        <img src="kissan.jpg" alt="Verres">
        <h2>كيسان</h2>

        <div class="quantity">
            <button onclick="decrease(this)">➖</button>
            <span>1</span>
            <button onclick="increase(this)">➕</button>
        </div>

        <p class="price">${price} DH</p>

        <a href="cart.html">إضافة إلى السلة</a>
    </div>

    <div class="card">
        <img src="casseroles.jpg" alt="Casseroles">
        <h2>كسرونات</h2>

        <div class="quantity">
            <button onclick="decrease(this)">➖</button>
            <span>1</span>
            <button onclick="increase(this)">➕</button>
        </div>

        <p class="price">${price} DH</p>

        <a href="cart.html">إضافة إلى السلة</a>
    </div>

    <div class="card">
        <img src="bread.jpg" alt="Plats">
        <h2>براد</h2>

        <div class="quantity">
            <button onclick="decrease(this)">➖</button>
            <span>1</span>
            <button onclick="increase(this)">➕</button>
        </div>

        <p class="price">${price} DH</p>

        <a href="cart.html">إضافة إلى السلة</a>
    </div>

    <div class="card">
        <img src="ustensiles.jpg" alt="Ustensiles">
        <h2>المقراج</h2>

        <div class="quantity">
            <button onclick="decrease(this)">➖</button>
            <span>1</span>
            <button onclick="increase(this)">➕</button>
        </div>

        <p class="price">${price} DH</p>

        <a href="cart.html">إضافة إلى السلة</a>
    </div>

</div>

<script>
function increase(btn){
    let span = btn.parentElement.querySelector("span");
    span.innerText = parseInt(span.innerText) + 1;
}

function decrease(btn){
    let span = btn.parentElement.querySelector("span");
    let value = parseInt(span.innerText);

    if(value > 1){
        span.innerText = value - 1;
    }
}
</script>

<script>
function increase(btn){
    let span =
btn.parentElement.querySelector("span");
    span.innerText = parseInt(span.innerText) +
1;
    updatePrice(btn)
}

function decrease(btn){
    let span =
btn.parentElement.querySelector("span");
    let value =parseInt(span.innerText);

    if(value > 1){
        span.innerText = value - 1;
    }    
    updatePrice(btn);
}

function updatePrice(btn) {
    let span =
btn.parentElement.querySelector("span");
    let quantity = parseInt(span.innerText);
    let card = btn.closest("card");
    let pricePerItem =
parseInt(card.querySelector(".price").innerText);
    let newPrice = pricePerItem * quantity

    card.querySelector(".price").innerText = newPrice + " DH";
}
</script>

</body>
</html>
