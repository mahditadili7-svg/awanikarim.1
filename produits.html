<title>Nos Produits</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial,sans-serif;
}

body{
    background:#f5f5f5;
}

h1{
    text-align:center;
    color:#8b5a2b;
    margin:30px 0;
}

.container{
    width:90%;
    margin:auto;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
    gap:25px;
}

.card{
    background:white;
    border-radius:20px;
    overflow:hidden;
    box-shadow:0 5px 15px rgba(0,0,0,0.15);
    text-align:center;
    transition:0.3s;
}

.card:hover{
    transform:translateY(-10px);
}

.card img{
    width:100%;
    height:220px;
    object-fit:cover;
}

.card h2{
    margin:20px 0;
    color:#8b5a2b;
}

.card a{
    display:inline-block;
    margin-bottom:20px;
    padding:12px 25px;
    background:#d4a373;
    color:white;
    text-decoration:none;
    border-radius:30px;
}

.card a:hover{
    background:#8b5a2b;
}
</style>
</head>
