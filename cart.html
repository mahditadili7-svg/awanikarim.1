<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panier</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background: #f5f5f5;
            padding: 20px;
        }

        .container{
            width: 80%;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h1{
            text-align: center;
            color: #8b5a2b;
            margin-bottom: 30px;
        }

        form{
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        label{
            font-size: 16px;
            color: #333;
        }

        input, select{
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .buttons{
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .buttons button, .buttons a{
            padding: 12px 25px;
            background: #8b5a2b;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            border: none;
        }

        .buttons button:hover, .buttons a:hover{
            background: #5a3e1c;
        }
        .back-btn{
    position: fixed;
    top: 20px;
    left: 20px;
    background: #8b5a2b;
    color: white;
    border: none;
    padding: 10px 15px;
    border-radius: 50px;
    font-size: 18px;
    cursor: pointer;
}

.back-btn:hover{
    background: #6e4520;
}
    </style>
</head>
<body>

    <button class="back-btn" onclick="history.back()">← رجوع</button>

    <div class="container">
        <h1>طلب الآن</h1>

        <form id="orderForm">
            <label for="name">الاسم الكامل:</label>
            <input type="text" id="name" name="name" required>

            <label for="phone">رقم الهاتف:</label>
            <input type="tel" id="phone" name="phone" required>

            <label for="city">المدينة:</label>
            <select id="city" name="city" required>
                <option value="">اختر المدينة</option>
                <option value="Casablanca">Casablanca</option>
                <!-- زيد جميع المدن المغربية هنا -->
            </select>

            <label for="neighborhood">الحي:</label>
            <input type="text" id="neighborhood" name="neighborhood" required>

            <div class="buttons">
                <button type="submit">موافق</button>
                <a id="whatsappBtn" target="_blank" href="#">اطلب عبر واتساب</a>
            </div>
        </form>
    </div>

    <script>
        const form = document.getElementById('orderForm');
        form.addEventListener('submit', function(e) {
            e.preventDefault();
        
            // جمع البيانات من الفورم
            let name = document.getElementById('name').value;
            let phone = document.getElementById('phone').value;
            let city = document.getElementById('city').value;
            let neighborhood = document.getElementById('neighborhood').value;
            
            // تكوين الرسالة لواتساب
            let message = `Bonjour, voici mes coordonnées de commande :%0A`;
            message += `Nom: ${name}%0A`;
            message += `Téléphone: ${phone}%0A`;
            message += `Ville: ${city}%0A`;
            message += `Quartier: ${neighborhood}%0A`;

            // إرسال الرسالة لواتساب
            document.getElementById('whatsappBtn').href = 'https://wa.me/212661451749?text=' + encodeURIComponent(message);
            // هنا خصك تبدل الرقم بالرقم ديالك

            // هنا يقدر يكون إرسال البيانات عبر AJAX أو أي طريقة أخرى
            alert('تم');
        
        });
</script>
