<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Panier</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial, sans-serif;
        }

        body{
            background: #f5f5f5;
            padding: 20px;
        }

        .container{
            width: 80%;
            margin: auto;
            background: white;
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        h1{
            text-align: center;
            color: #8b5a2b;
            margin-bottom: 30px;
        }

        form{
            display: flex;
            flex-direction: column;
            gap: 20px;
        }

        label{
            font-size: 16px;
            color: #333;
        }

        input, select{
            padding: 10px;
            font-size: 16px;
            border: 1px solid #ddd;
            border-radius: 5px;
        }

        .buttons{
            display: flex;
            justify-content: center;
            gap: 20px;
            margin-top: 30px;
        }

        .buttons button, .buttons a{
            padding: 12px 25px;
            background: #8b5a2b;
            color: white;
            text-decoration: none;
            border-radius: 30px;
            cursor: pointer;
            font-size: 16px;
            border: none;
        }

        .buttons button:hover, .buttons a:hover{
            background: #5a3e1c;
        }
    .order-btn{
    position:relative;
    width:260px;
    height:55px;
    background:#8b5a2b;
    color:white;
    border:none;
    border-radius:40px;
    cursor:pointer;
    overflow:hidden;
    font-size:18px;
    transition:0.3s;
}

.order-btn:hover{
    background:#6d4523;
}

.btn-text,
.truck,
.success{
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    transition:all .6s ease;
}

.truck{
    font-size:28px;
    opacity:0;
    left:-50px;
}

.success{
    opacity:0;
    color:#7CFC00;
    font-weight:bold;
}

.order-btn.loading .btn-text{
    opacity:0;
}

.order-btn.loading .truck{
    opacity:1;
    animation:drive 2s linear forwards;
}

.order-btn.done .truck{
    opacity:0;
}

.order-btn.done .success{
    opacity:1;
}

@keyframes drive{
    0%{
        left:-40px;
    }
    100%{
        left:120%;
    }
}
    </style>
</head>
<body>

    <div class="container">
        <h1>طلب الآن</h1>

        <form id="orderForm">
            <label for="name">الاسم الكامل:</label>
            <input type="text" id="name" name="name" required>

            <label for="phone">رقم الهاتف:</label>
            <input type="tel" id="phone" name="phone" required>

            <label for="city">المدينة:</label>
            <select id="city" name="city" required>
                <option value="">اختر المدينة</option>
                <option value="Casablanca">Casablanca</option>
                <option value="Rabat">Rabat</option>
                <option value="Fès">Fès</option>
                <option value="Marrakech">Marrakech</option>
                <!-- زيد جميع المدن المغربية هنا -->
            </select>

            <label for="neighborhood">الحي:</label>
            <input type="text" id="neighborhood" name="neighborhood" required>

            <div class="buttons">
    <button type="submit" id="orderBtn" class="order-btn">

        <span class="btn-text">اطلب عبر WhatsApp</span>

        <span class="truck">
            🚚
        </span>

        <span class="success">
            ✅ تم تجهيز الطلب
        </span>

    </button>
</div>

   <script>
const orderBtn = document.getElementById("orderBtn");

form.addEventListener("submit", function(e){
    e.preventDefault();

    orderBtn.classList.add("loading");

    setTimeout(function(){

        orderBtn.classList.remove("loading");
        orderBtn.classList.add("done");

        let name = document.getElementById("name").value;
        let phone = document.getElementById("phone").value;
        let city = document.getElementById("city").value;
        let neighborhood = document.getElementById("neighborhood").value;

        let cart = JSON.parse(localStorage.getItem("cart")) || [];

        let message = "السلام عليكم، بغيت نطلب:\n\n";
        let total = 0;

        cart.forEach(item=>{
            message += `🛒 ${item.name} × ${item.quantity}\n`;
            total += item.price * item.quantity;
        });

        message += `\n💰 المجموع: ${total} DH\n\n`;
        message += `👤 الاسم: ${name}\n`;
        message += `📞 الهاتف: ${phone}\n`;
        message += `🏙️ المدينة: ${city}\n`;
        message += `📍 الحي: ${neighborhood}`;

        setTimeout(function(){
            window.open(
                "https://wa.me/2126XXXXXXXX?text=" + encodeURIComponent(message),
                "_blank"
            );
        },1000);

    },2000);

});
</script>
